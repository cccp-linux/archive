name: Build and publish binary and source packages

on:
  push:
    branches:
      - source
  workflow_dispatch:

jobs:
  merge:
    uses: ./.github/workflows/merge.yml

  build:
    needs: merge
    if: ${{ needs.merge.outputs.changed }}
    strategy:
      matrix:
        path: ${{ fromJson(needs.merge.outputs.changed) }}
      max-parallel: 1
    uses: ./.github/workflows/build-package.yml
    with:
      path: ${{ matrix.path }}

  remove:
    needs: merge
    if: ${{ needs.merge.outputs.removed }}
    strategy:
      matrix:
        path: ${{ fromJson(needs.merge.outputs.removed) }}
      max-parallel: 1
    uses: ./.github/workflows/remove-package.yml
    with:
      path: ${{ matrix.path }}

  publish:
    needs: [build, remove]
    if: always() && (needs.build.result == 'success' || needs.remove.result == 'success')
    uses: ./.github/workflows/publish.yml
    secrets: inherit
